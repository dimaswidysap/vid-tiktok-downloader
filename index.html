<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok Downloader</title>
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->

    <link rel="stylesheet" href="css/ham-button.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/style-content.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/warning.css" />
    <!-- <link rel="stylesheet" href="css/button.css" /> -->
  </head>
  <body>
    <header>
      <nav></nav>
    </header>
    <main>
      <section class="con-form">
        <div>
          <div>
            <div class="con-input">
              <input
                type="text"
                id="videoUrl"
                placeholder="Tempel link TikTok di sini..."
              />
              <button class="btn-clear-input">
                <p>Clear</p>
              </button>
            </div>

            <button id="btnDownload">Ambil Video</button>
            <button class="hidden">Download vedeo lain</button>
          </div>

          <p id="loading">Sabar ya, lagi diproses...</p>
        </div>
      </section>

      <section class="con-content">
        <!-- <p id="videoTitle">Vedeomu nanti disini!</p> -->

        <figure id="result">
          <img
            id="thumbnail"
            class="w-full rounded-lg mb-4 shadow-sm"
            src=""
            alt="Thumbnail"
          />
        </figure>
        <a id="downloadLink" href="#" class="hidden"> Download Video </a>
      </section>
    </main>
    <footer></footer>

    <section class="warning">
      <div>
        <p>Input url Empty</p>
        <button class="btn-warning-close">Okey</button>
      </div>
    </section>

    <script type="module" src="javascript/script.js"></script>
    <script type="module" src="javascript/input.js"></script>
  </body>
</html>
